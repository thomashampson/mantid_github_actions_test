# this uses the action to merge special branches on push
# https://github.com/marketplace/actions/merge-branch
name: Merge protected branches

on:
  workflow_dispatch:
  push:
    branches: [ornl-next, release-next]

jobs:
  merge-into-main:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.AUTOMERGE_TOKEN }}

      - name: Merge ${{ github.ref_name }} into main
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git fetch origin main "${{ github.ref_name }}"

          git checkout main
          git merge --no-ff "origin/${{ github.ref_name }}"
            -m "Merge ${{ github.ref_name }} into main"

          git push origin main
